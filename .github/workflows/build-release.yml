name: Build and Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.0.6-alpha.1)'
        required: true
        default: 'v0.0.6-alpha.1'
      prerelease:
        description: 'Mark as pre-release'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    container:
      image: node:22-bookworm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Install build dependencies
        run: apt-get update && apt-get install -y python3 make g++ libfuse2

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npx @electron/rebuild

      - name: Build Linux
        run: npx electron-builder --linux -p never

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag }}
          prerelease: ${{ github.event.inputs.prerelease }}
          files: |
            dist/*.AppImage
            dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npx @electron/rebuild

      - name: Generate macOS icon
        run: |
          mkdir -p build/icons/icon.iconset
          cp build/icons/16x16.png build/icons/icon.iconset/icon_16x16.png
          cp build/icons/32x32.png build/icons/icon.iconset/icon_16x16@2x.png
          cp build/icons/32x32.png build/icons/icon.iconset/icon_32x32.png
          cp build/icons/64x64.png build/icons/icon.iconset/icon_32x32@2x.png
          cp build/icons/128x128.png build/icons/icon.iconset/icon_128x128.png
          cp build/icons/256x256.png build/icons/icon.iconset/icon_128x128@2x.png
          cp build/icons/256x256.png build/icons/icon.iconset/icon_256x256.png
          cp build/icons/512x512.png build/icons/icon.iconset/icon_256x256@2x.png
          cp build/icons/512x512.png build/icons/icon.iconset/icon_512x512.png
          iconutil -c icns build/icons/icon.iconset -o build/icons/icon.icns

      - name: Build macOS
        run: npx electron-builder --mac -p never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag }}
          prerelease: ${{ github.event.inputs.prerelease }}
          files: |
            dist/*.dmg
            dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npx @electron/rebuild

      - name: Generate Windows icon
        run: |
          npm install --no-save png-to-ico
          npx png-to-ico build/icons/256x256.png > build/icons/icon.ico

      - name: Build Windows
        run: npx electron-builder --win -p never

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag }}
          prerelease: ${{ github.event.inputs.prerelease }}
          files: |
            dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}