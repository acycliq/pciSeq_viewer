# Builds the Docusaurus site in website/ and deploys it to GitHub Pages.
#
# One-time setup in the repo:
#   Settings -> Pages -> Build and deployment -> Source: "GitHub Actions"
#
# Adjust `branches` below if your default branch is not desktop_app.
name: Deploy docs

on:
  push:
    branches: [desktop_app]
    paths:
      - 'website/**'
      - 'src/**'
      - 'lib/**'
      - 'utils/**'
      - 'config/**'
      - 'arrow-loader/**'
      - 'index.html'
      - 'styles.css'
      - 'config.js'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Build Docusaurus
        working-directory: website
        run: |
          npm ci
          npm run build

      - name: Prepare combined deployment
        run: |
          mkdir -p deployment_payload/web_viewer

          # 1. Docusaurus documentation site at the root
          cp -r website/build/* deployment_payload/

          # 2. Web viewer under /web_viewer
          cp index.html styles.css config.js deployment_payload/web_viewer/
          [ -f icon.png ] && cp icon.png deployment_payload/web_viewer/
          [ -f selection_tool.png ] && cp selection_tool.png deployment_payload/web_viewer/

          # Directories
          cp -r src lib arrow-loader config utils deployment_payload/web_viewer/
          [ -d voxel-viewer ] && cp -r voxel-viewer deployment_payload/web_viewer/

          # Add .nojekyll to prevent GitHub Pages from processing with Jekyll
          touch deployment_payload/.nojekyll

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: deployment_payload

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
