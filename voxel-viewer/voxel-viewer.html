<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Viewer</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div id="container">

        <!-- Left Drawer (permanent) matching main UI style -->
        <div id="voxelControlsPanel" class="controls-panel" role="complementary" aria-label="Controls drawer">
            <div class="controls-content">
                <!-- Cell Classes Section -->
                <div class="control-section">
                    <h3 class="section-label">Cell Classes</h3>
                    <div class="cell-class-controls">
                        <button class="show-all-btn" id="voxelShowAllClassesBtn">Show All</button>
                        <button class="hide-all-btn" id="voxelHideAllClassesBtn">Hide All</button>
                    </div>
                    <div class="cell-class-filter-container">
                        <input type="text" class="filter-input" id="voxelClassFilter" placeholder="Filter classes…" autocomplete="off" spellcheck="false">
                    </div>
                    <div class="cell-class-list" id="voxelClassesList"></div>
                    <div class="legend-resize-handle" id="cellClassesResizeHandle" title="Drag to resize"></div>
                </div>

                <!-- Genes Section -->
                <div class="control-section">
                    <h3 class="section-label">Genes</h3>
                    <div class="cell-class-controls">
                        <button class="show-all-btn" id="voxelShowAllGenesBtn">Show All</button>
                        <button class="hide-all-btn" id="voxelHideAllGenesBtn">Hide All</button>
                    </div>
                    <div class="cell-class-filter-container">
                        <input type="text" class="filter-input" id="voxelGeneFilter" placeholder="Filter genes…" autocomplete="off" spellcheck="false">
                    </div>
                    <div class="cell-class-list" id="voxelGenesList"></div>
                    <div class="legend-resize-handle" id="genesResizeHandle" title="Drag to resize"></div>
                </div>

                <!-- Visibility Toggles Section -->
                <div class="control-section">
                    <h3 class="section-label">Visibility Controls</h3>
                    <div class="visibility-toggles">
                        <label class="zen-switch">
                            <span class="label-text">Spot to cell assignments</span>
                            <input type="checkbox" id="showLinesToggle" checked>
                            <span class="switch-slider"></span>
                        </label>
                        <label class="zen-switch">
                            <span class="label-text">Background voxels</span>
                            <input type="checkbox" id="showBackgroundToggle" checked>
                            <span class="switch-slider"></span>
                        </label>
                        <label class="zen-switch">
                            <span class="label-text">Cell voxels</span>
                            <input type="checkbox" id="showHoleVoxelsToggle">
                            <span class="switch-slider"></span>
                        </label>
                        <label class="zen-switch">
                            <span class="label-text">Boundary voxels</span>
                            <input type="checkbox" id="showBoundaryVoxelsToggle">
                            <span class="switch-slider"></span>
                        </label>
                        <label class="zen-switch">
                            <span class="label-text">Ghosting</span>
                            <input type="checkbox" id="showGhostingToggle" checked>
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                </div>

                <!-- Hidden Cells Section -->
                <div class="control-section">
                    <h3 class="section-label">Hidden Cells <span class="count-badge" id="voxelHiddenCellsCount">(0)</span></h3>
                    <button id="voxelHiddenCellsShowAll" class="hidden-cells-btn">Show All</button>
                    <div id="voxelHiddenCellsList" class="hidden-cells-list"></div>
                </div>
            </div>
        </div>

        <div class="slider-container">
            <input type="range" class="z-slicer"
                   id="sliceZ" />
            <div class="slider-value" id="sliderValue"></div>
        </div>
    </div>

    <!-- Import d3.js -->
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <!-- Import deck.gl and luma.gl -->
    <script src="https://unpkg.com/deck.gl@8.1.0/dist.min.js"></script>
    <script src="https://unpkg.com/@luma.gl/core@8.1.0/dist.min.js"></script>
    <script src="https://unpkg.com/@luma.gl/engine@8.1.0/dist.min.js"></script>

    <!-- Import dataset (using existing name for stability) -->
    <script src="sample-data.js"></script>

    <!-- Configure asset base for textures relative to this viewer -->
    <!-- Import voxel layer -->
    <script src="./voxel-layer.js"></script>

    <!-- Import glyph configuration for consistent gene colors -->
    <script src="../modules/glyphConfig.js"></script>

    <!-- Application Logic (using existing name for stability) -->
    <script type="module" src="voxel-app.js"></script>
</body>
</html>
