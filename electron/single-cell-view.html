<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Single Cell Data</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #111827;
            color: #e5e7eb;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Top bar: tabs + filter */
        .top-bar {
            display: flex;
            align-items: center;
            background: #1f2937;
            border-bottom: 1px solid #374151;
            padding: 0 16px;
            flex-shrink: 0;
            gap: 16px;
        }
        .tab-bar { display: flex; }
        .tab {
            padding: 12px 20px;
            font-size: 13px;
            cursor: pointer;
            color: #9ca3af;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            user-select: none;
            white-space: nowrap;
        }
        .tab:hover { color: #e5e7eb; }
        .tab.active { color: #60a5fa; border-bottom-color: #60a5fa; font-weight: 500; }

        /* Filters */
        .filter-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .filter-group label { font-size: 11px; color: #6b7280; white-space: nowrap; }
        .filter-group input {
            width: 160px;
            background: #111827;
            border: 1px solid #374151;
            border-radius: 4px;
            color: #e5e7eb;
            padding: 5px 10px;
            font-size: 12px;
            outline: none;
        }
        .filter-group input:focus { border-color: #3b82f6; }
        .filter-group input::placeholder { color: #4b5563; }
        .filter-sep { width: 1px; height: 20px; background: #374151; margin: 0 4px; }
        .filter-count { font-size: 11px; color: #6b7280; white-space: nowrap; }

        /* Grid container */
        .grid-container { flex: 1; overflow: auto; padding: 0; }

        /* Error / loading state */
        .message { padding: 40px; font-size: 13px; color: #6b7280; text-align: center; }
        .message.error { color: #f87171; }

        /* Table */
        table { border-collapse: collapse; font-size: 12px; width: max-content; min-width: 100%; }
        thead { position: sticky; top: 0; z-index: 10; background: #1f2937; }
        th {
            padding: 8px 14px;
            text-align: right;
            font-weight: 500;
            color: #9ca3af;
            border-bottom: 1px solid #374151;
            border-right: 1px solid #1f2937;
            cursor: pointer;
            white-space: nowrap;
            user-select: none;
        }
        th:hover { color: #e5e7eb; background: #263147; }
        th.sorted-asc::after  { content: ' ▲'; font-size: 10px; color: #60a5fa; }
        th.sorted-desc::after { content: ' ▼'; font-size: 10px; color: #60a5fa; }
        th.gene-col, td.gene-col {
            text-align: left;
            position: sticky;
            left: 0;
            background: #1f2937;
            z-index: 5;
            border-right: 1px solid #374151;
        }
        thead th.gene-col { z-index: 15; background: #1f2937; }
        tbody tr:hover td { background: #1e293b; }
        tbody tr:hover td.gene-col { background: #263147; }
        td {
            padding: 6px 14px;
            text-align: right;
            border-bottom: 1px solid #1f2937;
            border-right: 1px solid #1a2234;
            color: #d1d5db;
            white-space: nowrap;
        }
        td.gene-col { color: #93c5fd; font-weight: 500; background: #111827; }
        tbody tr:nth-child(even) td { background: #131c2e; }
        tbody tr:nth-child(even) td.gene-col { background: #131c2e; }
        tbody tr:nth-child(even):hover td { background: #1e293b; }
        .highlight { color: #fbbf24; }

        /* Total row pinned at the bottom. Sum over all genes per class, never
           changes with the gene filter, never participates in sorting (it
           lives in tfoot, not tbody). */
        tfoot { position: sticky; bottom: 0; z-index: 10; background: #1f2937; }
        tfoot td {
            font-weight: 600;
            color: #fbbf24;
            border-top: 2px solid #374151;
            border-bottom: none;
            background: #1f2937;
        }
        tfoot td.gene-col { color: #fbbf24; background: #1f2937; z-index: 15; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="tab-bar">
        <div class="tab active" id="tab-ref"  data-tab="ref">Reference (scRNA-seq)</div>
        <div class="tab"        id="tab-impl" data-tab="impl">Implied (spatial data)</div>
    </div>
    <div class="filter-wrap">
        <div class="filter-group">
            <label>Gene</label>
            <input type="text" id="geneFilter" placeholder="e.g. Gad" />
        </div>
        <div class="filter-sep"></div>
        <div class="filter-group">
            <label>Class</label>
            <input type="text" id="classFilter" placeholder="e.g. DG" />
        </div>
        <div class="filter-sep"></div>
        <span class="filter-count" id="filterCount"></span>
    </div>
</div>

<div class="grid-container" id="grid-container">
    <div class="message" id="msg">Loading...</div>
</div>

<script>
    const api = window.scView;

    let refData  = null;
    let implData = null;
    let activeTab = 'ref';
    let filterText = '';
    let classFilterText = '';

    const sortState = { ref: { col: -1, asc: true }, impl: { col: -1, asc: true } };
    let rowOrder = { ref: [], impl: [] };

    // Total per class column = sum over all genes. Computed once at load
    // because it does not change with the gene filter or sorting.
    function computeColumnTotals(data) {
        const { gene_panel, class_names, data: matrix } = data;
        const totals = new Array(class_names.length).fill(0);
        for (let g = 0; g < gene_panel.length; g++) {
            for (let k = 0; k < class_names.length; k++) {
                totals[k] += matrix[g][k];
            }
        }
        return totals;
    }

    async function init() {
        const [refRes, implRes] = await Promise.all([
            api.getReferenceData(),
            api.getImpliedData()
        ]);

        if (refRes.success) {
            refData = refRes;
            refData.totals = computeColumnTotals(refData);
            rowOrder.ref = refData.gene_panel.map((_, i) => i);
        }
        if (implRes.success) {
            implData = implRes;
            implData.totals = computeColumnTotals(implData);
            rowOrder.impl = implData.gene_panel.map((_, i) => i);
        }

        renderTab(activeTab);
    }

    function getFilteredOrder(tab) {
        const data = tab === 'ref' ? refData : implData;
        const order = rowOrder[tab];
        if (!filterText) return order;
        const lower = filterText.toLowerCase();
        return order.filter(gi => data.gene_panel[gi].toLowerCase().includes(lower));
    }

    function getFilteredClassIndices(data) {
        if (!classFilterText) return data.class_names.map((_, k) => k);
        const lower = classFilterText.toLowerCase();
        return data.class_names.reduce((acc, cls, k) => {
            if (cls.toLowerCase().includes(lower)) acc.push(k);
            return acc;
        }, []);
    }

    function renderTab(tab) {
        activeTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));

        const container = document.getElementById('grid-container');
        const data = tab === 'ref' ? refData : implData;

        if (!data) {
            const err = 'Diagnostics data not loaded. Use Diagnostics -> Setup... to load diagnostics.db.';
            container.innerHTML = `<div class="message error">${err}</div>`;
            document.getElementById('filterCount').textContent = '';
            return;
        }

        const filteredGenes   = getFilteredOrder(tab);
        const filteredClasses = getFilteredClassIndices(data);
        updateFilterCount(filteredGenes.length, data.gene_panel.length, filteredClasses.length, data.class_names.length);

        container.innerHTML = '';
        container.appendChild(buildTable(tab, data, filteredGenes, filteredClasses));
    }

    function updateFilterCount(genes, totalGenes, classes, totalClasses) {
        const el = document.getElementById('filterCount');
        const gPart  = filterText      ? `${genes} / ${totalGenes} genes`     : `${totalGenes} genes`;
        const clPart = classFilterText ? `${classes} / ${totalClasses} classes` : `${totalClasses} classes`;
        el.textContent = `${gPart} · ${clPart}`;
    }

    function buildTable(tab, data, filteredGenes, filteredClasses) {
        const { gene_panel, class_names, data: matrix } = data;
        const ss = sortState[tab];

        const table = document.createElement('table');

        // Header
        const thead = document.createElement('thead');
        const headerRow = document.createElement('tr');

        const geneTh = document.createElement('th');
        geneTh.textContent = 'Gene';
        geneTh.className = 'gene-col';
        geneTh.addEventListener('click', () => onSort(tab, -1));
        if (ss.col === -1) geneTh.className += ss.asc ? ' sorted-asc' : ' sorted-desc';
        headerRow.appendChild(geneTh);

        filteredClasses.forEach(k => {
            const th = document.createElement('th');
            // Highlight matching substring in class name
            if (classFilterText) {
                const name = class_names[k];
                const lower = classFilterText.toLowerCase();
                const idx = name.toLowerCase().indexOf(lower);
                if (idx !== -1) {
                    th.innerHTML =
                        escapeHtml(name.slice(0, idx)) +
                        `<span class="highlight">${escapeHtml(name.slice(idx, idx + classFilterText.length))}</span>` +
                        escapeHtml(name.slice(idx + classFilterText.length));
                } else {
                    th.textContent = name;
                }
            } else {
                th.textContent = class_names[k];
            }
            th.addEventListener('click', () => onSort(tab, k));
            if (ss.col === k) th.className = ss.asc ? 'sorted-asc' : 'sorted-desc';
            headerRow.appendChild(th);
        });

        thead.appendChild(headerRow);
        table.appendChild(thead);

        // Body
        const tbody = document.createElement('tbody');
        const geneLower = filterText.toLowerCase();

        filteredGenes.forEach(gi => {
            const tr = document.createElement('tr');

            const geneTd = document.createElement('td');
            geneTd.className = 'gene-col';

            // Highlight matching substring in gene name
            if (filterText) {
                const name = gene_panel[gi];
                const idx = name.toLowerCase().indexOf(geneLower);
                if (idx !== -1) {
                    geneTd.innerHTML =
                        escapeHtml(name.slice(0, idx)) +
                        `<span class="highlight">${escapeHtml(name.slice(idx, idx + filterText.length))}</span>` +
                        escapeHtml(name.slice(idx + filterText.length));
                } else {
                    geneTd.textContent = name;
                }
            } else {
                geneTd.textContent = gene_panel[gi];
            }

            tr.appendChild(geneTd);

            filteredClasses.forEach(k => {
                const td = document.createElement('td');
                td.textContent = matrix[gi][k].toFixed(3);
                tr.appendChild(td);
            });

            tbody.appendChild(tr);
        });

        table.appendChild(tbody);

        // Total row at the bottom. Sums are over ALL genes (ignore the gene
        // filter on purpose, so the totals stay stable as you type), but the
        // class filter still applies, so only currently-visible columns appear.
        const tfoot = document.createElement('tfoot');
        const totalRow = document.createElement('tr');

        const totalLabel = document.createElement('td');
        totalLabel.textContent = 'Total';
        totalLabel.className = 'gene-col';
        totalRow.appendChild(totalLabel);

        filteredClasses.forEach(k => {
            const td = document.createElement('td');
            td.textContent = data.totals[k].toFixed(3);
            totalRow.appendChild(td);
        });

        tfoot.appendChild(totalRow);
        table.appendChild(tfoot);

        return table;
    }

    function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function onSort(tab, col) {
        const ss = sortState[tab];
        const data = tab === 'ref' ? refData : implData;
        const { gene_panel, data: matrix } = data;

        ss.col === col ? ss.asc = !ss.asc : (ss.col = col, ss.asc = true);

        const indices = gene_panel.map((_, i) => i);
        if (col === -1) {
            indices.sort((a, b) => ss.asc
                ? gene_panel[a].localeCompare(gene_panel[b])
                : gene_panel[b].localeCompare(gene_panel[a]));
        } else {
            indices.sort((a, b) => ss.asc
                ? matrix[a][col] - matrix[b][col]
                : matrix[b][col] - matrix[a][col]);
        }

        rowOrder[tab] = indices;
        renderTab(tab);
    }

    // Tab clicks
    document.querySelectorAll('.tab').forEach(t => {
        t.addEventListener('click', () => renderTab(t.dataset.tab));
    });

    // Gene filter
    document.getElementById('geneFilter').addEventListener('input', e => {
        filterText = e.target.value.trim();
        renderTab(activeTab);
    });

    // Class filter
    document.getElementById('classFilter').addEventListener('input', e => {
        classFilterText = e.target.value.trim();
        renderTab(activeTab);
    });

    init();
</script>
</body>
</html>
