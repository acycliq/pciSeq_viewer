<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Single Cell Data</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #111827;
            color: #e5e7eb;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Tabs */
        .tab-bar {
            display: flex;
            background: #1f2937;
            border-bottom: 1px solid #374151;
            padding: 0 16px;
            flex-shrink: 0;
        }
        .tab {
            padding: 12px 20px;
            font-size: 13px;
            cursor: pointer;
            color: #9ca3af;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            user-select: none;
        }
        .tab:hover { color: #e5e7eb; }
        .tab.active { color: #60a5fa; border-bottom-color: #60a5fa; font-weight: 500; }

        /* Grid container */
        .grid-container {
            flex: 1;
            overflow: auto;
            padding: 0;
        }

        /* Error / loading state */
        .message {
            padding: 40px;
            font-size: 13px;
            color: #6b7280;
            text-align: center;
        }
        .message.error { color: #f87171; }

        /* Table */
        table {
            border-collapse: collapse;
            font-size: 12px;
            width: max-content;
            min-width: 100%;
        }
        thead {
            position: sticky;
            top: 0;
            z-index: 10;
            background: #1f2937;
        }
        th {
            padding: 8px 14px;
            text-align: right;
            font-weight: 500;
            color: #9ca3af;
            border-bottom: 1px solid #374151;
            border-right: 1px solid #1f2937;
            cursor: pointer;
            white-space: nowrap;
            user-select: none;
        }
        th:hover { color: #e5e7eb; background: #263147; }
        th.sorted-asc::after  { content: ' ▲'; font-size: 10px; color: #60a5fa; }
        th.sorted-desc::after { content: ' ▼'; font-size: 10px; color: #60a5fa; }
        /* Gene name column */
        th.gene-col, td.gene-col {
            text-align: left;
            position: sticky;
            left: 0;
            background: #1f2937;
            z-index: 5;
            border-right: 1px solid #374151;
        }
        thead th.gene-col { z-index: 15; background: #1f2937; }
        tbody tr:hover td { background: #1e293b; }
        tbody tr:hover td.gene-col { background: #263147; }
        td {
            padding: 6px 14px;
            text-align: right;
            border-bottom: 1px solid #1f2937;
            border-right: 1px solid #1a2234;
            color: #d1d5db;
            white-space: nowrap;
        }
        td.gene-col { color: #93c5fd; font-weight: 500; background: #111827; }
        tbody tr:nth-child(even) td { background: #131c2e; }
        tbody tr:nth-child(even) td.gene-col { background: #131c2e; }
        tbody tr:nth-child(even):hover td { background: #1e293b; }
    </style>
</head>
<body>

<div class="tab-bar">
    <div class="tab active" id="tab-ref"  data-tab="ref">Reference (scRNA-seq)</div>
    <div class="tab"        id="tab-impl" data-tab="impl">Implied (spatial data)</div>
</div>

<div class="grid-container" id="grid-container">
    <div class="message" id="msg">Loading...</div>
</div>

<script>
    const api = window.scView;

    // State
    let refData   = null;  // { gene_panel, class_names, data }
    let implData  = null;
    let activeTab = 'ref';

    // Sort state per tab
    const sortState = { ref: { col: -1, asc: true }, impl: { col: -1, asc: true } };

    // Row order per tab (indices into gene_panel)
    let rowOrder = { ref: [], impl: [] };

    async function init() {
        const [refRes, implRes] = await Promise.all([
            api.getReferenceData(),
            api.getImpliedData()
        ]);

        if (refRes.success) {
            refData = refRes;
            rowOrder.ref = refData.gene_panel.map((_, i) => i);
        }
        if (implRes.success) {
            implData = implRes;
            rowOrder.impl = implData.gene_panel.map((_, i) => i);
        }

        renderTab(activeTab);
    }

    function renderTab(tab) {
        activeTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));

        const container = document.getElementById('grid-container');
        const data = tab === 'ref' ? refData : implData;

        if (!data) {
            const err = tab === 'ref'
                ? 'Reference data not loaded. Use Single Cell Data → Setup... to select raw_single_cell_data.db.'
                : 'Implied data not available. Use Diagnostics → Setup... to load diagnostics.db.';
            container.innerHTML = `<div class="message error">${err}</div>`;
            return;
        }

        container.innerHTML = '';
        container.appendChild(buildTable(tab, data));
    }

    function buildTable(tab, data) {
        const { gene_panel, class_names, data: matrix } = data;
        const order = rowOrder[tab];
        const ss = sortState[tab];

        const table = document.createElement('table');

        // Header
        const thead = document.createElement('thead');
        const headerRow = document.createElement('tr');

        const geneTh = document.createElement('th');
        geneTh.textContent = 'Gene';
        geneTh.className = 'gene-col';
        geneTh.dataset.col = -1;
        geneTh.addEventListener('click', () => onSort(tab, -1));
        if (ss.col === -1) geneTh.className += ss.asc ? ' sorted-asc' : ' sorted-desc';
        headerRow.appendChild(geneTh);

        class_names.forEach((cls, k) => {
            const th = document.createElement('th');
            th.textContent = cls;
            th.dataset.col = k;
            th.addEventListener('click', () => onSort(tab, k));
            if (ss.col === k) th.className = ss.asc ? 'sorted-asc' : 'sorted-desc';
            headerRow.appendChild(th);
        });

        thead.appendChild(headerRow);
        table.appendChild(thead);

        // Body
        const tbody = document.createElement('tbody');
        order.forEach(gi => {
            const tr = document.createElement('tr');

            const geneTd = document.createElement('td');
            geneTd.className = 'gene-col';
            geneTd.textContent = gene_panel[gi];
            tr.appendChild(geneTd);

            const row = matrix[gi];
            row.forEach(val => {
                const td = document.createElement('td');
                td.textContent = val.toFixed(3);
                tr.appendChild(td);
            });

            tbody.appendChild(tr);
        });

        table.appendChild(tbody);
        return table;
    }

    function onSort(tab, col) {
        const ss = sortState[tab];
        const data = tab === 'ref' ? refData : implData;
        const { gene_panel, data: matrix } = data;

        if (ss.col === col) {
            ss.asc = !ss.asc;
        } else {
            ss.col = col;
            ss.asc = true;
        }

        const indices = gene_panel.map((_, i) => i);
        if (col === -1) {
            // Sort by gene name
            indices.sort((a, b) => ss.asc
                ? gene_panel[a].localeCompare(gene_panel[b])
                : gene_panel[b].localeCompare(gene_panel[a]));
        } else {
            indices.sort((a, b) => ss.asc
                ? matrix[a][col] - matrix[b][col]
                : matrix[b][col] - matrix[a][col]);
        }

        rowOrder[tab] = indices;
        renderTab(tab);
    }

    // Tab clicks
    document.querySelectorAll('.tab').forEach(t => {
        t.addEventListener('click', () => renderTab(t.dataset.tab));
    });

    init();
</script>
</body>
</html>
