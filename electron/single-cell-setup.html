<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Single Cell Data Setup</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1f2937;
            color: #e5e7eb;
            padding: 24px;
            user-select: none;
        }
        h2 { font-size: 16px; font-weight: 600; margin-bottom: 20px; color: #f9fafb; }
        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: 12px; color: #9ca3af; margin-bottom: 6px; font-weight: 500; }
        .field-row { display: flex; gap: 8px; }
        .field-row input {
            flex: 1;
            background: #111827;
            border: 1px solid #374151;
            border-radius: 4px;
            color: #e5e7eb;
            padding: 8px 10px;
            font-size: 13px;
            outline: none;
        }
        .field-row input:focus { border-color: #3b82f6; }
        .field-row button {
            background: #374151;
            border: 1px solid #4b5563;
            border-radius: 4px;
            color: #e5e7eb;
            padding: 8px 14px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
        }
        .field-row button:hover { background: #4b5563; }
        .hint { font-size: 11px; color: #6b7280; margin-top: 4px; }
        .actions { margin-top: 24px; display: flex; justify-content: flex-end; gap: 10px; }
        .actions button { padding: 8px 20px; border-radius: 4px; font-size: 13px; cursor: pointer; border: none; }
        .btn-save { background: #3b82f6; color: white; font-weight: 500; }
        .btn-save:hover { background: #2563eb; }
        .btn-cancel { background: #374151; color: #e5e7eb; }
        .btn-cancel:hover { background: #4b5563; }
        .status { margin-top: 12px; font-size: 12px; min-height: 18px; }
    </style>
</head>
<body>
    <h2>Single Cell Data Setup</h2>

    <div class="field">
        <label>raw_single_cell_data.db</label>
        <div class="field-row">
            <input type="text" id="scPath" placeholder="/path/to/raw_single_cell_data.db" readonly />
            <button id="browseBtn">Browse</button>
        </div>
        <div class="hint">Select the raw_single_cell_data.db file from the diagnostics folder</div>
    </div>

    <div class="actions">
        <button class="btn-save" id="saveBtn">Save</button>
        <button class="btn-cancel" id="exitBtn">Cancel</button>
    </div>
    <div class="status" id="status"></div>

    <script>
        const api = window.scSetup;

        api.getConfig().then(config => {
            if (config.path) document.getElementById('scPath').value = config.path;
        });

        document.getElementById('browseBtn').addEventListener('click', async () => {
            const result = await api.browseFile();
            if (result) document.getElementById('scPath').value = result;
        });

        document.getElementById('saveBtn').addEventListener('click', async () => {
            const p = document.getElementById('scPath').value;
            if (!p) { showStatus('Please select a file', '#f87171'); return; }
            const result = await api.saveConfig({ path: p });
            if (result.success) {
                showStatus('Saved', '#4ade80');
                setTimeout(() => api.close(), 600);
            } else {
                showStatus(result.error || 'Failed to save', '#f87171');
            }
        });

        document.getElementById('exitBtn').addEventListener('click', () => api.close());

        function showStatus(msg, color) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.style.color = color;
        }
    </script>
</body>
</html>
