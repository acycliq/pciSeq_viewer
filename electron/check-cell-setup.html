<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>check_cell Setup</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1f2937;
            color: #e5e7eb;
            padding: 24px;
            user-select: none;
        }
        h2 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #f9fafb;
        }
        .field {
            margin-bottom: 16px;
        }
        .field label {
            display: block;
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .field-row {
            display: flex;
            gap: 8px;
        }
        .field-row input {
            flex: 1;
            background: #111827;
            border: 1px solid #374151;
            border-radius: 4px;
            color: #e5e7eb;
            padding: 8px 10px;
            font-size: 13px;
            outline: none;
        }
        .field-row input:focus {
            border-color: #3b82f6;
        }
        .field-row button {
            background: #374151;
            border: 1px solid #4b5563;
            border-radius: 4px;
            color: #e5e7eb;
            padding: 8px 14px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
        }
        .field-row button:hover {
            background: #4b5563;
        }
        .hint {
            font-size: 11px;
            color: #6b7280;
            margin-top: 4px;
        }
        .actions {
            margin-top: 24px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        .actions button {
            padding: 8px 20px;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            border: none;
        }
        .btn-save {
            background: #3b82f6;
            color: white;
            font-weight: 500;
        }
        .btn-save:hover { background: #2563eb; }
        .btn-cancel {
            background: #374151;
            color: #e5e7eb;
        }
        .btn-cancel:hover { background: #4b5563; }
        .status {
            margin-top: 12px;
            font-size: 12px;
            color: #4ade80;
            min-height: 18px;
        }
    </style>
</head>
<body>
    <h2>check_cell Setup</h2>

    <div class="field">
        <label>check_cell Data Folder</label>
        <div class="field-row">
            <input type="text" id="checkCellPath" placeholder="/path/to/check_cell" readonly />
            <button id="browseFolder">Browse</button>
        </div>
        <div class="hint">Select the folder containing check_cell_meta.json and binary files</div>
    </div>

    <div class="actions">
        <button class="btn-cancel" id="cancelBtn">Cancel</button>
        <button class="btn-save" id="saveBtn">Save</button>
    </div>
    <div class="status" id="status"></div>

    <script>
        const api = window.checkCellSetup;

        // Load existing config on open
        api.getConfig().then(config => {
            if (config.checkCellPath) document.getElementById('checkCellPath').value = config.checkCellPath;
        });

        document.getElementById('browseFolder').addEventListener('click', async () => {
            const result = await api.browseFolder();
            if (result) document.getElementById('checkCellPath').value = result;
        });

        document.getElementById('saveBtn').addEventListener('click', async () => {
            const checkCellPath = document.getElementById('checkCellPath').value;
            if (!checkCellPath) {
                document.getElementById('status').textContent = 'Please select a folder';
                document.getElementById('status').style.color = '#f87171';
                return;
            }
            const result = await api.saveConfig({ checkCellPath });
            if (result.success) {
                document.getElementById('status').textContent = 'Saved';
                document.getElementById('status').style.color = '#4ade80';
                setTimeout(() => api.close(), 600);
            } else {
                document.getElementById('status').textContent = result.error || 'Failed to save';
                document.getElementById('status').style.color = '#f87171';
            }
        });

        document.getElementById('cancelBtn').addEventListener('click', () => {
            api.close();
        });
    </script>
</body>
</html>
